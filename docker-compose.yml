version: '3.8'

services:

  auth-service:
    image: loansphere-auth
    container_name: auth-service
    ports:
      - "8081:8081"

  user-service:
    image: loansphere-user
    container_name: user-service
    ports:
      - "8082:8082"

  loan-service:
    image: loansphere-loan
    container_name: loan-service
    ports:
      - "8083:8083"

  api-gateway:
    image: loansphere-gateway
    container_name: api-gateway
    ports:
      - "8090:8090"