server:
  port: 8090

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:

      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      server:
        webflux:
          routes:

            - id: auth-service
              uri: lb://AUTH-SERVICE
              predicates:
                - Path=/api/auth/**

            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/profile/**

            - id: loan-service
              uri: lb://LOAN-SERVICE
              predicates:
                - Path=/api/loan/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka